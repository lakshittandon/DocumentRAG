version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: deployment/backend.Dockerfile
    environment:
      JWT_SECRET: ${JWT_SECRET:-change-me-before-production}
      TOKEN_EXPIRY_MINUTES: ${TOKEN_EXPIRY_MINUTES:-720}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres
      - qdrant

  frontend:
    build:
      context: .
      dockerfile: deployment/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:80"
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rag
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:

