services:
  - type: web
    name: reliable-rag-platform
    runtime: docker
    plan: free
    dockerfilePath: ./deployment/backend.Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: TOKEN_EXPIRY_MINUTES
        value: "10080"
      - key: MODEL_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_GENERATION_MODEL
        value: gemini-3.1-flash-lite
      - key: GEMINI_EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: GEMINI_API_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta
      - key: GEMINI_TIMEOUT_SECONDS
        value: "30"
      - key: GEMINI_EMBEDDING_DIMENSIONS
        value: "768"
      - key: OLLAMA_BASE_URL
        value: https://ollama.com
      - key: OLLAMA_MODEL
        value: qwen2.5:0.5b
      - key: OLLAMA_TIMEOUT_SECONDS
        value: "120"
      - key: OLLAMA_API_KEY
        sync: false
      - key: MAX_UPLOAD_SIZE_MB
        value: "10"
      - key: CORPUS_DIR
        value: /app/data/corpus
      - key: UPLOAD_DIR
        value: /app/data/uploads
      - key: ENABLE_OCR
        value: "true"
      - key: OCR_LANGUAGE
        value: eng
      - key: EVALUATION_SAMPLE_LIMIT
        value: "8"
      - key: DATABASE_URL
        fromDatabase:
          name: reliable-rag-postgres
          property: connectionString
databases:
  - name: reliable-rag-postgres
    plan: free
